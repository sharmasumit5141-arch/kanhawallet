<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer — Kanha Wallet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; min-height:100vh; }
.topbar { background:linear-gradient(135deg,#667eea,#764ba2); padding:20px; color:white; display:flex; align-items:center; gap:12px; }
.topbar a { color:white; text-decoration:none; font-size:20px; }
.card { background:white; margin:16px; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.bal { text-align:center; margin-bottom:24px; }
.bal p { color:#888; font-size:13px; }
.bal h2 { font-size:32px; font-weight:800; color:#667eea; }
label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px; }
input { width:100%; padding:14px; border:2px solid #eee; border-radius:10px; font-size:16px; outline:none; margin-bottom:16px; }
input:focus { border-color:#667eea; }
.btn { width:100%; padding:16px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; }
.msg { margin-top:12px; padding:12px; border-radius:8px; text-align:center; font-size:14px; display:none; }
</style>
</head>
<body>
<div class="topbar"><a href="dashboard.html">←</a><h2>Send Money</h2></div>
<div class="card">
  <div class="bal"><p>Available Balance</p><h2 id="bal">₹0</h2></div>
  <label>Receiver Mobile Number</label>
  <input type="tel" id="mobile" placeholder="Enter 10-digit mobile" maxlength="10">
  <label>Amount (₹)</label>
  <input type="number" id="amount" placeholder="Enter amount" min="1">
  <label>Note (Optional)</label>
  <input type="text" id="note" placeholder="What's this for?">
  <button class="btn" onclick="send()">Send Money 💸</button>
  <div id="msg" class="msg"></div>
</div>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href='index.html';
fetch('/api/wallet/balance',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()).then(d=>document.getElementById('bal').textContent='₹'+d.balance.toFixed(2));
async function send(){
  const mobile=document.getElementById('mobile').value;
  const amount=document.getElementById('amount').value;
  const note=document.getElementById('note').value;
  const msg=document.getElementById('msg');
  const r=await fetch('/api/transfer',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({mobile,amount:Number(amount),note})});
  const d=await r.json();
  msg.style.display='block';
  if(d.success){msg.style.background='#efe';msg.style.color='#060';msg.textContent='✅ '+d.message;}
  else{msg.style.background='#fee';msg.style.color='#c00';msg.textContent='❌ '+d.error;}
}
</script>
</body>
</html>
